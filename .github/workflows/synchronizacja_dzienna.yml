name: Synchronizacja dzienna

on:
  # 6 przebiegow dziennie TYLKO w dni robocze (1-5). W weekend pobierania nie
  # ma — chodza wtedy same streszczenia (doganianie). MF (KIS) w weekend i tak
  # praktycznie nie publikuje, a poniedzialkowe okno lookback nadrobi zaleglosc.
  # Czasy PL (lato): 9,12,15,18,21,00 -> UTC 7,10,13,16,19,22.
  # Nocny przebieg (22:00 UTC): szersze okno 30 dni + mail-podsumowanie.
  schedule:
    - cron: '0 7,10,13,16,19 * * 1-5'
    - cron: '0 22 * * 1-5'

  workflow_dispatch:
    inputs:
      okno_dni:
        description: 'Okno synchronizacji w dniach (puste = 10)'
        required: false
        default: ''
      wyslij_mail:
        description: 'Wyslac mail-podsumowanie? (1 = tak)'
        required: false
        default: '0'

concurrency:
  group: synchronizacja-dzienna
  cancel-in-progress: false

jobs:
  synchronizuj:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Pobierz kod repozytorium
        uses: actions/checkout@v4

      - name: Ustaw Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Zainstaluj zaleznosci
        run: |
          python -m pip install --upgrade pip
          pip install requests PyPDF2 python-docx beautifulsoup4 lxml psycopg2-binary

      - name: Parametry przebiegu (okno + mail)
        id: params
        run: |
          # Przebieg nocny (PL 00:00 = 22:00 UTC): szersze okno 30 dni (lapie
          # publikacje opoznione) i jedyny mail-podsumowanie w ciagu doby.
          # Pozostale przebiegi: wask okno 10 dni, bez maila.
          if [ "${{ github.event.schedule }}" = "0 22 * * 1-5" ]; then
            echo "okno=30" >> "$GITHUB_OUTPUT"
            echo "mail=1"  >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            OKNO_IN="${{ github.event.inputs.okno_dni }}"
            echo "okno=${OKNO_IN:-10}" >> "$GITHUB_OUTPUT"
            echo "mail=${{ github.event.inputs.wyslij_mail }}" >> "$GITHUB_OUTPUT"
          else
            echo "okno=10" >> "$GITHUB_OUTPUT"
            echo "mail=0"  >> "$GITHUB_OUTPUT"
          fi

      - name: Uruchom synchronizacje
        env:
          SUPABASE_HOST:            ${{ secrets.SUPABASE_HOST }}
          SUPABASE_PORT:            ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DB:              ${{ secrets.SUPABASE_DB }}
          SUPABASE_USER:            ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD:        ${{ secrets.SUPABASE_PASSWORD }}
          GMAIL_ADRES:              ${{ secrets.GMAIL_ADRES }}
          GMAIL_HASLO_APLIKACJI:    ${{ secrets.GMAIL_HASLO_APLIKACJI }}
          EMAIL_ODBIORCA:           ${{ secrets.EMAIL_ODBIORCA }}
          OKNO_SYNCHRONIZACJI_DNI:  ${{ steps.params.outputs.okno }}
          SYNC_MAIL:                ${{ steps.params.outputs.mail }}
        run: python synchronizacja_dzienna.py

      - name: Podsumowanie
        if: always()
        run: echo "Synchronizacja zakonczona (okno ${{ steps.params.outputs.okno }} dni, mail ${{ steps.params.outputs.mail }})."
