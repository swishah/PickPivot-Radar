name: Monitoring fraz (e-mail)

on:
  # Sprawdzanie po nocnej synchronizacji oraz po popołudniowych pobraniach
  # na żądanie. Skrypt jest idempotentny (para fraza+dokument wysyłana raz),
  # więc częstsze przebiegi nie dublują maili. Czasy w UTC.
  schedule:
    - cron: '30 2 * * *'   # ~4:30 PL (lato) — tuż po nocnej synchronizacji
    - cron: '0 12 * * *'   # ~14:00 PL — łapie pobrania z przedpołudnia
    - cron: '0 18 * * *'   # ~20:00 PL — łapie pobrania z popołudnia

  workflow_dispatch: {}

concurrency:
  group: monitoring-fraz
  cancel-in-progress: false

jobs:
  monitoruj:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Zależności
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sprawdź frazy i wyślij powiadomienia
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: python monitoring_fraz.py
