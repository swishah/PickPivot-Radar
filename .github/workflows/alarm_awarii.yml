name: Alarm awarii (nadzor)

on:
  # NIEZALEZNY harmonogram — celowo POZA lancuchem synchronizacji, zeby
  # zadzialal takze wtedy, gdy lancuch jest zerwany. Co 3 h w ciagu dnia:
  # UTC 6,9,12,15,18,21 = PL (lato) 8,11,14,17,20,23. Kazdy przebieg widzi
  # poprzednia zakonczona synchronizacje.
  schedule:
    - cron: '0 6-21/3 * * *'

  workflow_dispatch: {}

concurrency:
  group: alarm-awarii
  cancel-in-progress: false

jobs:
  nadzor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Zaleznosci
        run: |
          python -m pip install --upgrade pip
          pip install requests psycopg2-binary

      - name: Sprawdz stan synchronizacji
        env:
          SUPABASE_DB_URL:        ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_HOST:          ${{ secrets.SUPABASE_HOST }}
          SUPABASE_PORT:          ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DB:            ${{ secrets.SUPABASE_DB }}
          SUPABASE_USER:          ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD:      ${{ secrets.SUPABASE_PASSWORD }}
          SMTP_HOST:              ${{ secrets.SMTP_HOST }}
          SMTP_PORT:              ${{ secrets.SMTP_PORT }}
          SMTP_USER:              ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:          ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM:              ${{ secrets.SMTP_FROM }}
          ALARM_ODBIORCA:         ${{ secrets.EMAIL_ODBIORCA }}
          EMAIL_ODBIORCA:         ${{ secrets.EMAIL_ODBIORCA }}
        run: python alarm_awarii.py
