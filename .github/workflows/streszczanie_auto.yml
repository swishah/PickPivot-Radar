name: Automat streszczen (OpenRouter)

on:
  # Rozprzezony harmonogram (kontrola egressu). Czasy UTC; PL = +2 h (lato).
  #  - dni robocze: 2x dziennie (UTC 8 i 14 = PL 10:00 i 16:00),
  #  - weekend: "doganianie" co 3 h (UTC 6-21 = PL 8:00-23:00), bo w tygodniu
  #    czesc streszczen nie zdazy sie zrobic przy oszczedzaniu egressu.
  schedule:
    - cron: '0 8,14 * * 1-5'
    - cron: '0 6-21/3 * * 6,0'

  workflow_dispatch: {}

concurrency:
  group: streszczanie-auto
  cancel-in-progress: false

jobs:
  streszczaj:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4
      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Zaleznosci
        run: |
          python -m pip install --upgrade pip
          pip install requests psycopg2-binary
      - name: Streszcz brakujace
        env:
          SUPABASE_DB_URL:      ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_HOST:        ${{ secrets.SUPABASE_HOST }}
          SUPABASE_PORT:        ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DB:          ${{ secrets.SUPABASE_DB }}
          SUPABASE_USER:        ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD:    ${{ secrets.SUPABASE_PASSWORD }}
          OPENROUTER_API_KEY:   ${{ secrets.OPENROUTER_API_KEY }}
        run: python streszczanie_auto.py
      - name: Podsumowanie
        if: always()
        run: echo "Streszczanie zakonczone."
